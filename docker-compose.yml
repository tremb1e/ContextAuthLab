x-contextauthlab-server-image: &contextauthlab-server-image
  build:
    context: ./server
    dockerfile: Dockerfile
  image: contextauthlab/server:${VERSION:-latest}

x-contextauthlab-server-volumes: &contextauthlab-server-volumes
  - ${DATA_VOLUME:-./data/paper}:/data/paper:rw
  - ${LOG_VOLUME:-./logs}:/app/logs:rw

services:
  contextauthlab-server-init:
    <<: *contextauthlab-server-image
    container_name: cca-server-init
    user: "0:0"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "mkdir -p /data/paper /app/logs && chown -R ${SERVER_CONTAINER_UID:-1000}:${SERVER_CONTAINER_GID:-1000} /data/paper /app/logs && chmod -R u+rwX,g+rwX /data/paper /app/logs"
    volumes: *contextauthlab-server-volumes
    restart: "no"

  contextauthlab-server:
    <<: *contextauthlab-server-image
    container_name: cca-server
    restart: unless-stopped
    depends_on:
      contextauthlab-server-init:
        condition: service_completed_successfully
    ports:
      - "${SERVER_BIND:-127.0.0.1}:${SERVER_PORT:-8000}:8000"
    environment:
      SERVER_DATA_DIR: /data/paper
      SERVER_LOG_DIR: /app/logs
      SERVER_RULES_FILE: ${SERVER_RULES_FILE:-/data/paper/rules.json}
      SERVER_FIX_PERMISSIONS: ${SERVER_FIX_PERMISSIONS:-true}
      SERVER_CHOWN_RECURSIVE: ${SERVER_CHOWN_RECURSIVE:-true}
      APP_UID: ${SERVER_CONTAINER_UID:-1000}
      APP_GID: ${SERVER_CONTAINER_GID:-1000}
      SERVER_STUDY_SALT: ${SERVER_STUDY_SALT:-Continuous_Authentication}
      RULES_VERSION: ${RULES_VERSION:-1}
      INGEST_REQUIRE_AUTH: ${INGEST_REQUIRE_AUTH:-false}
      TZ: ${TZ:-UTC}
    volumes: *contextauthlab-server-volumes
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp
